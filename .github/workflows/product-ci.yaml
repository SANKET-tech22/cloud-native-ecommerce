name: Product Service CI

on:
  push:
    branches:
      - main
    paths:
      - 'services/product-service/**'
      - '.github/workflows/product-ci.yaml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_PRODUCT }}

      - name: Build Image
        run: |
          docker build -t product-service ./services/product-service

      - name: Set Image Tag 
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
 
      - name: Tag Image
        run: |
          docker tag product-service:latest ${{ secrets.ECR_REPOSITORY_PRODUCT }}:${{ env.IMAGE_TAG }}

      - name: Push Image
        run: |
          docker push ${{ secrets.ECR_REPOSITORY_PRODUCT }}:${{ env.IMAGE_TAG }}