apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels: 
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 857874856616.dkr.ecr.ap-south-1.amazonaws.com/auth-service:latest
          ports:
            - containerPort: 5000
          env: 
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "postgres"
            - name: DB_USER
              value: "admin"
            - name: DB_PASS
              value: "admin"
            - name: DB_NAME
              value: "authdb"
            - name: JWT_SECRET
              value: "supersecret"  