apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: 857874856616.dkr.ecr.ap-south-1.amazonaws.com/notification-service:<IMAGE_TAG>
          envFrom:
            - configMapRef:
                name: notification-config