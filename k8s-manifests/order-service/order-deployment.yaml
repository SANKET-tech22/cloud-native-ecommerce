apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 857874856616.dkr.ecr.ap-south-1.amazonaws.com/order-service:8cda57ac8384dae7a4e6f2697c90cd23ee6b96f3
          ports:
            - containerPort: 5003
          envFrom:
            - configMapRef:
                name: order-config